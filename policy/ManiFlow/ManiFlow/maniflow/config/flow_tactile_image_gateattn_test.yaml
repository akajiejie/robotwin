defaults:
  - task: demo_task_tactile

name: train_maniflow_tactile_image_policy_gateattn_no_gate_decay
task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "flow_tactile_image_gateattn_test"

horizon: 32
n_obs_steps: 2
n_action_steps: 32
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
keypoint_visible_rate: 1.0
obs_as_global_cond: true

policy:
  _target_: maniflow.policy.maniflow_image_policy.ManiFlowTransformerImagePolicy
  
  # 🔥 观测编码维度（必须与obs_encoder输出维度一致）
  cond_dim: 768  # SigLIP ViT-Base输出维度，也是tactile和proprio投影后的维度
  
  # 🔥🔥🔥 Gate-Attention 配置 - 关闭Gate参数的Weight Decay实验 🔥🔥🔥
  use_gate_attn: true       # 启用 Gate-Attention 机制（使用DiTXGateAttn）
  gate_type: "headwise"     # Gate-Attention类型: 'none', 'headwise', 'elementwise'
                            # - 'none': 标准cross-attention（无gate）
                            # - 'headwise': 每个注意力头一个gate值（轻量级）⭐ 当前使用
                            # - 'elementwise': 每个元素一个gate值（最细粒度，参考Qwen3）
  block_type: "DiTX"        # 保留此参数以保持向后兼容性
  
  # 架构配置
  n_layer: 12
  n_head: 8
  n_emb: 768
  
  # 🔥 TimmMultimodalEncoder 在 output_token_sequence=True 模式下的输出：
  #    输出格式: (B, L_total, D)，其中 L_total = 所有模态的token数（已展开时间步）
  #    
  #    Token组织结构（按模态分组，Proprio已融合进Head）：
  #    - head模态 (head_grid_size=1):  [head_t0(1个), head_t1(1个)] = 2 tokens（含融合的proprio）
  #    - rgb_wrist模态: [L_wrist_t0, L_wrist_t1, R_wrist_t0, R_wrist_t1] = 4 tokens
  #    - tactile模态:   [L_tactile_t0, L_tactile_t1, R_tactile_t0, R_tactile_t1] = 4 tokens
  #    
  #    总token数: L_total = 2 + 4 + 4 = 10 (当head_grid_size=1时)
  #    
  # 🔥 DiTX位置编码配置:
  #    self.vis_cond_pos_embed = nn.Parameter(torch.zeros(1, visual_cond_len * n_obs_steps, n_emb))
  #    所以需要: visual_cond_len × n_obs_steps = L_total
  #    即: visual_cond_len = L_total / n_obs_steps = 10 / 2 = 5
  visual_cond_len: 5  # 每个时间步的模态token数（DiTX内部会 × n_obs_steps = 2 得到10个位置编码）
  
  max_lang_cond_len: 1024
  qkv_bias: true
  qk_norm: true
  language_conditioned: false
  pre_norm_modality: false

  flow_batch_ratio: 0.75 
  consistency_batch_ratio: 0.25
  sample_t_mode_flow: "beta"
  sample_t_mode_consistency: "discrete" 
  sample_dt_mode_consistency: "uniform"
  sample_target_t_mode: "relative"
  denoise_timesteps: 10
  diffusion_timestep_embed_dim: 128
  diffusion_target_t_embed_dim: 128
  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 10
  obs_as_global_cond: true
  shape_meta: ${shape_meta}

  obs_encoder:
    _target_: maniflow.model.vision_2d.timm_multimodal_encoder.TimmMultimodalEncoder
    shape_meta: ${shape_meta}
    
    ##### RGB相机配置 (SigLIP) #####
    model_name: 'vit_base_patch16_siglip_224'
    pretrained: true
    frozen: false
    global_pool: ''
    head_grid_size: 1 
    feature_aggregation: 'avg' # 其他相机（如腕部）依然维持1个token
    downsample_ratio: 32
    
    ##### 触觉传感器配置 #####
    tactile_model_name: 'resnet18'
    tactile_pretrained: false
    tactile_frozen: false
    tactile_feature_dim: 768
    tactile_num_kp: 32
    tactile_crop_shape: null
    share_tactile_model: true
    tactile_output_all_patches: false
    
    #####输出token序列模式 #####
    output_token_sequence: true
    
    # 🔥 关闭所有数据增强，确保模型能完美拟合单条数据
    transforms: []
     
    use_group_norm: false
    share_rgb_model: false
    imagenet_norm: true

ema:
  _target_: maniflow.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 1       # 🔥 单条数据：batch_size必须为1
  num_workers: 0      # 🔥 单条数据：关闭多进程加载，避免overhead
  shuffle: False      # 🔥 单条数据：关闭shuffle，确保训练稳定性
  pin_memory: True
  persistent_workers: False  # 🔥 num_workers=0时必须为False

val_dataloader:
  batch_size: 1
  num_workers: 0
  shuffle: False
  pin_memory: True
  persistent_workers: False

# 🔥🔥🔥 优化器配置 - Gate参数免除Weight Decay实验 🔥🔥🔥
# 核心改动：get_optim_groups 函数已自动将以下参数排除在weight_decay之外：
#   1. cross_attn.q.weight / cross_attn.q.bias (生成gate score的核心)
#   2. _modality_bias_tensor (模态特定的gate初始化偏置)
#   3. 任何包含"gate"关键词的参数
# 
# 实验对比组：
#   - 基线组（原始配置）: weight_decay=1.0e-4，所有参数都受惩罚
#   - 实验组（本配置）: weight_decay=1.0e-4，但Gate参数被自动保护
optimizer:
  _target_: torch.optim.AdamW
  lr: 5.0e-4  # 🔥 提高学习率加速过拟合（原2e-4 → 5e-4）
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.0  # 🔥 关闭weight_decay，单条数据不需要正则化

training:
  device: "cuda:0"
  env_device: "cuda:0"
  seed: 42
  debug: False
  resume: False  # 🔥 单条数据测试：从头训练，不resume旧模型
  lr_scheduler: cosine
  lr_warmup_steps: 50  # 🔥 大幅缩短warmup（原500→50），快速达到峰值学习率
  num_epochs: 2000  # 🔥 单条数据：1 epoch = 1 step，所以2000 epoch = 2000步
  gradient_accumulate_every: 1
  use_wandb: true
  max_grad_norm: 5.0
  use_ema: False  # 🔥 关闭EMA，单条数据不需要模型平滑
  rollout_every: 100000  # 🔥 关闭rollout（设为超大值），节省时间
  checkpoint_every: 50  # 🔥 每50个epoch保存一次checkpoint
  val_every: 10  # 🔥 每10个epoch验证一次
  sample_every: 10  # 🔥 每10个epoch采样一次
  max_train_steps: null  # 🔥 改为null（单条数据时此参数无效）
  max_val_steps: null
  tqdm_interval_sec: 1.0
  
  # 🔥 关闭所有模态Drop，确保输入完全一致
  modality_drop:
    head_drop: 0.0
    rgb_wrist_drop: 0.0
    tactile_drop: 0.0
    proprio_drop: 0.0

logging:
  group: ${exp_name}
  id: null
  mode: online
  name: ${training.seed}_overfit_1sample
  project: ManiFlow_Tactile_Image_GateAttn_Test
  resume: false
  tags:
  - ${logging.project}
  - ditx_gateattn
  - gate_attention
  - tactile_rgb
  - headwise_gate
  - overfit_test  # 🔥 标记为过拟合测试实验
  - single_sample  # 🔥 单条数据实验标签

checkpoint:
  save_ckpt: True
  topk:
    monitor_key: train_loss  # 🔥 改为监控train_loss（单条数据val_loss无意义）
    mode: min
    k: 3  # 🔥 保留最优的3个checkpoint（观察收敛轨迹）
    format_str: 'epoch={epoch:04d}-train_loss={train_loss:.6f}.ckpt'  # 🔥 修正：使用epoch而非step
  
  save_last_ckpt: True
  save_last_snapshot: False
  save_every: 500  # 🔥 每500个epoch额外保存完整checkpoint（防止意外中断）

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}

checkpoint_num: 500
expert_data_num: 50
raw_task_name: none
setting: none
